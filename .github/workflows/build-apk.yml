name: Build APK

# Se ejecuta cuando:
#   - Se hace push a main (compila para verificar que todo este OK)
#   - Se sube un tag tipo v1.0.0 (compila Y crea un Release publico con el APK)
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch: # tambien permite correrlo manualmente desde la UI de GitHub

# Permisos necesarios para crear Releases publicos
permissions:
  contents: write

jobs:
  build:
    name: Compilar APK release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verificar version de Flutter
        run: flutter --version

      - name: Instalar dependencias
        run: flutter pub get

      - name: Configurar keystore para firmar el APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/chat_cifrado.jks
          cat > android/key.properties <<EOF
          storeFile=chat_cifrado.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Keystore configurado (firma persistente activa)"

      - name: Analizar codigo
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatCifrado-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # Solo cuando es un tag vX.X.X: crea un Release publico con el APK
      - name: Renombrar APK con version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ChatCifrado-${{ github.ref_name }}.apk

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Chat Cifrado ${{ github.ref_name }}
          body: |
            ## Chat Cifrado ${{ github.ref_name }}

            APK compilado automaticamente desde el commit `${{ github.sha }}`.

            ### Instalacion en Android
            1. Descarga el archivo `ChatCifrado-${{ github.ref_name }}.apk`
            2. En tu telefono, abrelo y permite "Instalar apps desconocidas" si te lo pide
            3. Conecta tu telefono al hotspot WiFi del servidor
            4. Abre la app, escribe tu nombre y toca **CONECTAR**

            > Requiere que el [servidor](https://github.com/twicegod/servidor_local) este corriendo en la red local.
          files: |
            build/app/outputs/flutter-apk/ChatCifrado-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
